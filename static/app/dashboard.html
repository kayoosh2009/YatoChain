<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YatoChain - Dashboard</title>
    <!-- Путь к стилям, если файл лежит в папке app/ -->
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Кастомные стили для этого макета */
        .navbar-content {
            display: flex;
            align-items: center;
        }
        .navbar-logo {
            height: 40px;
            width: auto;
            display: block;
        }
        /* Центрируем время */
        .server-time {
            flex: 1;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 1.25rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        /* Кнопка меню */
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .menu-btn img {
            height: 32px;
            width: 32px;
            /* Если твоя иконка menu.png темная, раскомментируй строку ниже, чтобы она стала белой */
            /* filter: invert(1); */ 
        }
        /* Стили для EXP */
        .exp-text {
            font-size: 1rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: var(--spacing-sm);
        }
        /* Контейнер для списка токенов */
        .token-list-card {
            margin-top: var(--spacing-lg);
            min-height: 400px;
        }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: var(--spacing-xl) 0;
        }
    </style>
</head>
<body>

    <!-- 1. НАВБАР -->
    <nav class="navbar">
        <div class="navbar-content">
            <!-- Слева: Логотип -->
            <a href="#" class="navbar-logo-link">
                <img src="../img/logo.png" alt="Logo" class="navbar-logo">
            </a>

            <!-- Центр: Время сервера -->
            <div class="server-time" id="serverTime">00:00:00</div>

            <!-- Справа: Кнопка меню -->
            <button class="menu-btn" id="menuToggle">
                <img src="../img/menu.png" alt="Menu">
            </button>
        </div>
    </nav>

    <!-- 2. ОСНОВНОЙ КОНТЕНТ -->
    <main class="container" style="padding-top: var(--spacing-lg);">
        
        <!-- Рамка с балансом и EXP -->
        <div class="balance-card fade-in">
            <div class="balance-label">Ваш баланс</div>
            <div class="balance-amount">$0.00</div>
            <div class="exp-text">0 EXP</div>
        </div>

        <!-- Список токенов (пока пустой) -->
        <div class="card token-list-card fade-in">
            <div class="card-header">
                <h3 class="card-title">Список токенов</h3>
            </div>
            <div class="card-body">
                <div class="empty-state">
                    <p>Список токенов пока пуст.</p>
                </div>
                <!-- Сюда потом добавим сами токены -->
            </div>
        </div>

    </main>

        <script>
            // Логика для бургер-меню (кнопка с картинкой menu.png)
            const menuBtn = document.getElementById('menuToggle');
            const sideMenu = document.getElementById('sideMenu'); // Само меню мы добавим на следующем шаге

            if (menuBtn) {
                menuBtn.addEventListener('click', () => {
                    if (sideMenu) {
                        sideMenu.classList.toggle('active');
                    } else {
                        console.log('Меню нажато! Сейчас добавим само меню.');
                    }
                });
            }
        </script>
</body>
</html>
