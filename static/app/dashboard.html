<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YatoChain - Dashboard</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Кастомные стили для этого макета */
        .navbar-content {
            display: flex;
            align-items: center;
        }
        .navbar-logo {
            height: 40px;
            width: auto;
            display: block;
        }
        .server-time {
            flex: 1;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 1.25rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .menu-btn img {
            height: 32px;
            width: 32px;
        }
        .exp-text {
            font-size: 1rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: var(--spacing-sm);
        }
        .token-list-card {
            margin-top: var(--spacing-lg);
            min-height: 400px;
        }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: var(--spacing-xl) 0;
        }

        /* --- НОВЫЕ СТИЛИ ДЛЯ КРАСИВОГО ОТОБРАЖЕНИЯ РЕКЛАМЫ --- */
        .ad-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: var(--spacing-md) auto;
            padding: var(--spacing-md);
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            max-width: 340px; /* Чуть больше самого баннера для "воздуха" */
            position: relative;
        }
        .ad-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-primary);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

                /* --- Стили для боковой панели меню --- */
        .side-panel {
            position: fixed;
            top: 0;
            left: -300px; /* Скрыто за левым краем экрана */
            width: 280px;
            height: 100vh;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-lg);
        }
        .side-panel.active {
            left: 0; /* Выезжает при добавлении класса active */
        }
        .side-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .side-panel-nav {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
        }
        .side-link {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .side-link:hover, .side-link.active {
            background-color: var(--bg-tertiary);
            color: var(--color-warning);
        }
        /* Затемнение фона при открытом меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <!-- 1. НАВБАР -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-logo-link">
                <img src="../img/logo.png" alt="Logo" class="navbar-logo">
            </a>
            <div class="server-time" id="serverTime">00:00:00</div>
            <button class="menu-btn" id="menuToggle">
                <img src="../img/menu.png" alt="Menu">
            </button>
        </div>
    </nav>

    <div id="frame" style="width: 320px;margin: auto;z-index: 99998;height: auto">
      <iframe data-aa='2448442' src='//ad.a-ads.com/2448442/?size=320x50&background_color=1C1C1C&title_color=F0B90B&title_hover_color=4A90E2'
                        style='border:0; padding:0; width:320px; height:50px; overflow:hidden;display: block;margin: auto'></iframe>
    </div>

    <!-- 2. ОСНОВНОЙ КОНТЕНТ -->
    <main class="container" style="padding-top: var(--spacing-sm);">
        
        <!-- Рамка с балансом и EXP -->
        <div class="balance-card fade-in">
            <div class="balance-label">Ваш баланс</div>
            <div class="balance-amount">$0.00</div>
            <div class="exp-text">0 EXP</div>
        </div>

        <!-- Список токенов (пока пустой) -->
        <div class="card token-list-card fade-in">
            <div class="card-header">
                <h3 class="card-title">Список токенов</h3>
            </div>
            <div class="card-body">
                <div class="empty-state">
                    <p>Список токенов пока пуст.</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. Часы
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('serverTime').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Логика бокового меню
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const closeMenuBtn = document.getElementById('closeMenu');
        const menuOverlay = document.getElementById('menuOverlay');

        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        if (menuToggle) menuToggle.addEventListener('click', openMenu);
        if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', closeMenu); // Закрыть при клике на фон
    </script>

        <!-- Затемнение фона -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Боковая панель меню -->
    <aside class="side-panel" id="sideMenu">
        <div class="side-panel-header">
            <h3 style="margin: 0; color: var(--color-warning);">Меню</h3>
            <button class="close-btn" id="closeMenu">&times;</button>
        </div>
        <nav class="side-panel-nav">
            <a href="#" class="side-link active">📊 Главная</a>
            <a href="#" class="side-link">🪙 Создать токен</a>
            <a href="#" class="side-link">📈 Торговля</a>
            <a href="#" class="side-link">💼 Портфель</a>
            <a href="#" class="side-link">⚙️ Настройки</a>
            <a href="#" class="side-link" style="color: var(--color-danger); margin-top: auto;">🚪 Выйти</a>
        </nav>
    </aside>

</body>
</html>
