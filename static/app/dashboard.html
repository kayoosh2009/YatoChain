<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YatoChain - Dashboard</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <!-- 1. НАВБАР -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-logo-link">
                <img src="../img/logo.png" alt="Logo" class="navbar-logo">
            </a>
            <div class="server-time" id="serverTime">00:00:00</div>
            <button class="menu-btn" id="menuToggle">
                <img src="../img/menu.png" alt="Menu">
            </button>
        </div>
    </nav>

    <div id="frame" style="width: 320px;margin: auto;z-index: 99998;height: auto">
        <iframe data-aa='2448442'
            src='//ad.a-ads.com/2448442/?size=320x50&background_color=1C1C1C&title_color=F0B90B&title_hover_color=4A90E2'
            style='border:0; padding:0; width:320px; height:50px; overflow:hidden;display: block;margin: auto'></iframe>
    </div>

    <!-- 2. ОСНОВНОЙ КОНТЕНТ -->
    <main class="container" style="padding-top: var(--spacing-sm);">

        <!-- Рамка с балансом и EXP -->
        <div class="balance-card fade-in">
            <div class="balance-label">Ваш баланс</div>
            <div class="balance-amount">$0.00</div>
            <div class="exp-text">0 EXP</div>
        </div>

        <!-- Список токенов (пока пустой) -->
        <div class="card token-list-card fade-in">
            <div class="card-header">
                <h3 class="card-title">Список токенов</h3>
            </div>
            <div class="card-body">
                <div class="empty-state">
                    <p>Список токенов пока пуст.</p>
                </div>
            </div>
        </div>

    </main>






    <!-- Боковая панель меню -->
    <aside class="side-panel" id="sideMenu">
        
        <!-- Шапка: Аватар, Имя и Название страницы -->
        <div class="side-panel-header">
            <div class="user-info">
                <img src="../img/person.png" alt="Avatar" class="user-avatar">
                <div class="user-details">
                    <span class="user-name">YatoTrader</span>
                    <span class="page-name">Dashboard</span>
                </div>
            </div>
            <button class="close-btn" id="closeMenu">&times;</button>
        </div>

        <!-- Навигация: 3 кнопки с иконками -->
        <nav class="side-panel-nav">
            <a href="#" class="side-link active">
                <img src="../img/wallet.png" alt="Dashboard" class="side-icon">
                <span>My Wallet</span>
            </a>
            <a href="#" class="side-link">
                <img src="../img/earn.png" alt="Trade" class="side-icon">
                <span>Daily Earn</span>
            </a>
            <a href="#" class="side-link">
                <img src="../img/add-token.png" alt="Portfolio" class="side-icon">
                <span>Add Token</span>
            </a>
        </nav>

        <!-- Футер: Кнопки выхода и Телеграма -->
        <div class="side-panel-footer">
            <a href="#" class="footer-btn logout-btn">
                <img src="../img/logout.png" alt="Logout" class="footer-icon">
                <span>Logout</span>
            </a>
            <a href="https://t.me/kayoosh_channel" target="_blank" class="footer-btn telegram-btn">
                <img src="../img/telegram.png" alt="Telegram" class="footer-icon">
                <span>Telegram</span>
            </a>
        </div>

    </aside>







    <div class="menu-overlay" id="menuOverlay"></div>

    <script>
        // 1. Часы
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const timeEl = document.getElementById('serverTime');
            if (timeEl) timeEl.textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Логика бокового меню
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const closeMenuBtn = document.getElementById('closeMenu');
        const menuOverlay = document.getElementById('menuOverlay');

        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        menuToggle.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);
    </script>

</body>

</html>
