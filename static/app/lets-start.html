<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>YatoChain - Start</title>
    <link rel="stylesheet" href="../style.css"> <!-- Если css в папке выше, замени на ../style.css -->
    <style>
        /* Кастомные стили только для сплит-лейаута, которых нет в основном CSS */
        .auth-layout {
            display: flex;
            height: 100vh;
        }

        .auth-left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-lg);
        }

        .auth-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
        }

        .auth-right img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: var(--radius-lg);
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
        }

        .auth-tabs {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .auth-tabs .btn {
            flex: 1;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-msg {
            margin-top: var(--spacing-md);
            text-align: center;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <div class="auth-left">
            <div class="auth-card card">
                <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                    <h2 class="card-title" style="margin-bottom: 0;">Добро пожаловать</h2>
                </div>
                <div class="card-body">
                    <div class="auth-tabs">
                        <button class="btn btn-primary" onclick="switchTab('login', this)">Вход</button>
                        <button class="btn btn-outline" onclick="switchTab('register', this)">Регистрация</button>
                    </div>

                    <form id="login" class="auth-form active" onsubmit="submitForm(event, '/auth/email')">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Войти</button>
                        <div id="login-msg" class="auth-msg"></div>
                    </form>

                    <form id="register" class="auth-form" onsubmit="submitForm(event, '/auth/register')">
                        <div class="form-group">
                            <label class="form-label">Никнейм</label>
                            <input type="text" name="nickname" class="form-input" placeholder="Ваш никнейм" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Создать
                            аккаунт</button>
                        <div id="register-msg" class="auth-msg"></div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="../index.html" style="color: var(--text-muted);">← go back</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <img src="img/letsstart.png" alt="Start">
        </div>
    </div>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.auth-tabs .btn').forEach(b => {
                b.classList.remove('btn-primary');
                b.classList.add('btn-outline');
            });
            document.getElementById(tabId).classList.add('active');
            el.classList.remove('btn-outline');
            el.classList.add('btn-primary');
        }

        async function submitForm(e, url) {
            e.preventDefault();
            const form = e.target;
            const msgEl = document.getElementById(form.id + '-msg');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            msgEl.textContent = 'Загрузка...';
            msgEl.style.color = 'var(--color-info)';

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const data = await res.json(); // Получаем JSON от бэкенда

                    if (data.message) {
                        // Это сработает при регистрации (покажет сообщение о письме)
                        msgEl.textContent = data.message;
                        msgEl.style.color = 'var(--color-success)';
                        form.reset(); // Очищаем поля формы после успешной регистрации
                    } else if (data.access_token) {
                        // Это сработает при успешном входе
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('user_email', data.email);

                        msgEl.textContent = 'Вход выполнен! Перенаправление...';
                        msgEl.style.color = 'var(--color-success)';

                        // Автоматический переход на dashboard через полсекунды
                        setTimeout(() => {
                            window.location.href = '/dashboard.html';
                        }, 500);
                    } else {
                        msgEl.textContent = 'Успешно!';
                        msgEl.style.color = 'var(--color-success)';
                    }
                } else {
                    msgEl.textContent = 'Ошибка. Проверьте данные.';
                    msgEl.style.color = 'var(--color-danger)';
                }
            } catch (err) {
                msgEl.textContent = 'Ошибка сети.';
                msgEl.style.color = 'var(--color-danger)';
            }
        }
    </script>
</body>

</html>
