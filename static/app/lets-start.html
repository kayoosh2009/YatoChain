<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YatoChain - Start Your Journey</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Подключаем Supabase JS клиент -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="../index.html" class="logo">YatoChain</a>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="https://t.me/yatochain" target="_blank" class="nav-link">Telegram</a></li>
            </ul>
        </div>
    </nav>

    <!-- Основной контент (Форма входа) -->
    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 200px); padding-top: 2rem; padding-bottom: 2rem;">
        <div class="card fade-in" style="max-width: 450px; width: 100%; text-align: center;">
            <div class="card-header" style="justify-content: center; border-bottom: none; margin-bottom: 0.5rem;">
                <h2 class="card-title" style="margin-bottom: 0; font-size: 1.75rem;">Welcome to YatoChain</h2>
            </div>
            <div class="card-body">
                <p style="margin-bottom: 2rem; color: var(--text-secondary);">
                    Sign in to start your risk-free trading journey, earn XP, and get your share of the token launch!
                </p>

                <!-- Кнопка входа через Google -->
                <button id="google-login-btn" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center; margin-bottom: 1rem;">
                    <svg width="20" height="20" viewBox="0 0 48 48" style="margin-right: 8px;">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google
                </button>

                <!-- Статусное сообщение -->
                <p id="status-message" style="margin-top: 1rem; color: var(--text-muted); font-size: 0.875rem; min-height: 20px;"></p>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left-block">
                <div class="footer-logo">YatoChain</div>
                <p class="footer-info">Created by KayooshStudio in 2026</p>
                <div class="footer-extra-text">
                    <p>Learn, trade, and earn without risking real money.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        // Замени на свои данные из Supabase Dashboard (Settings -> API)
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Элементы DOM
        const loginBtn = document.getElementById('google-login-btn');
        const statusMsg = document.getElementById('status-message');

        // ============================================
        // ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ
        // ============================================
        async function checkSession() {
            statusMsg.textContent = 'Checking session...';
            
            // Получаем текущую сессию
            const { data: { session } } = await supabase.auth.getSession();

            if (session && session.user) {
                // Сохраняем логин (email) в localStorage (тот самый "хеш"/словарь)
                localStorage.setItem('user_login', session.user.email);
                localStorage.setItem('user_id', session.user.id);
                
                statusMsg.textContent = 'Success! Redirecting...';
                
                // Редирект на главную страницу трейдинга
                // (Замени 'main.html' на 'main.py', если у тебя роутинг на бэкенде)
                setTimeout(() => {
                    window.location.href = '../main.html'; 
                }, 500);
            } else {
                statusMsg.textContent = '';
            }
        }

        // ============================================
        // ОБРАБОТКА КЛИКА ПО КНОПКЕ GOOGLE
        // ============================================
        loginBtn.addEventListener('click', async () => {
            loginBtn.disabled = true;
            loginBtn.textContent = 'Redirecting to Google...';
            statusMsg.textContent = 'Please wait...';

            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Важно: редирект обратно на эту же страницу, чтобы Supabase мог обработать токен
                    redirectTo: window.location.origin + window.location.pathname 
                }
            });

            if (error) {
                console.error('OAuth Error:', error);
                statusMsg.textContent = 'Error: ' + error.message;
                loginBtn.disabled = false;
                loginBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 48 48" style="margin-right: 8px;">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google`;
            }
        });

        // Запускаем проверку при загрузке страницы
        checkSession();
    </script>
</body>
</html>
