<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>YatoChain - Start</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f9f9f9; }
        .left { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .right { flex: 1; display: flex; justify-content: center; align-items: center; background: #eaeaea; }
        .right img { max-width: 80%; max-height: 80%; object-fit: contain; border-radius: 12px; }
        .container { width: 100%; max-width: 320px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #666; }
        .tab.active { color: #000; border-bottom: 2px solid #000; margin-bottom: -2px; font-weight: bold; }
        .form { display: none; flex-direction: column; gap: 12px; }
        .form.active { display: flex; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { padding: 12px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background: #333; }
        .msg { margin-top: 10px; text-align: center; font-size: 14px; }
        .back { margin-top: 20px; text-align: center; }
        .back a { color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="left">
        <div class="container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login', this)">Вход</div>
                <div class="tab" onclick="switchTab('register', this)">Регистрация</div>
            </div>
            
            <form id="login" class="form active" onsubmit="submitForm(event, '/auth/email')">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
                <div id="login-msg" class="msg"></div>
            </form>

            <form id="register" class="form" onsubmit="submitForm(event, '/auth/register')">
                <input type="text" name="nickname" placeholder="Никнейм" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit">Создать аккаунт</button>
                <div id="register-msg" class="msg"></div>
            </form>

            <div class="back"><a href="../index.html">← go back</a></div>
        </div>
    </div>
    <div class="right">
        <img src="img/letsstart.png" alt="Start">
    </div>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function submitForm(e, url) {
            e.preventDefault();
            const form = e.target;
            const msgEl = document.getElementById(form.id + '-msg');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            msgEl.textContent = 'Загрузка...';
            msgEl.style.color = 'blue';

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    msgEl.textContent = 'Успешно!';
                    msgEl.style.color = 'green';
                    if (form.id === 'login') {
                        // window.location.href = '/dashboard'; // Раскомментируй для редиректа
                    }
                } else {
                    msgEl.textContent = 'Ошибка. Проверьте данные.';
                    msgEl.style.color = 'red';
                }
            } catch (err) {
                msgEl.textContent = 'Ошибка сети.';
                msgEl.style.color = 'red';
            }
        }
    </script>
</body>
</html>
