<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTab Mining</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #E8E8E8;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }
        
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            height: calc(100vh - 80px);
        }
        
        /* Left Panel */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .stats-box {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #2a2a2a;
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .stats-box h2 {
            color: #00ff88;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #888;
            font-size: 16px;
        }
        
        .stat-value {
            color: #00ff88;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .control-box {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #2a2a2a;
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .input-group {
            display: flex;
            gap: 15px;
        }
        
        input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid #2a2a2a;
            border-radius: 10px;
            color: #E8E8E8;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(17, 17, 17, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        
        input::placeholder {
            color: #555;
        }
        
        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }
        
        button.stop {
            background: linear-gradient(135deg, #ff4444 0%, #cc3636 100%);
            color: #fff;
        }
        
        button.stop:hover {
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
        }
        
        /* Right Panel - Mempool Style Grid */
        .right-panel {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #2a2a2a;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .right-panel h2 {
            color: #00ff88;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
        }
        
        .mempool-grid {
            position: relative;
            width: 100%;
            height: calc(100% - 60px);
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 2px;
            perspective: 1000px;
        }
        
        .grid-cell {
            background: rgba(42, 42, 42, 0.3);
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
        }
        
        .grid-cell.active {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            animation: cellPulse 1s ease-in-out;
        }
        
        .grid-cell.large {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        .grid-cell.xlarge {
            grid-column: span 3;
            grid-row: span 3;
        }
        
        @keyframes cellPulse {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .mining-indicator {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(10, 10, 10, 0.8);
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            z-index: 10;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .status-text {
            color: #888;
            font-size: 14px;
        }
        
        .status-text.active {
            color: #00ff88;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .right-panel {
                min-height: 500px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    
    <div class="container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="stats-box">
                <h2>Mining Statistics</h2>
                <div class="stat-item">
                    <span class="stat-label">Total Hashes</span>
                    <span class="stat-value" id="totalHashes">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Valid Hashes</span>
                    <span class="stat-value" id="validHashes">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Your Balance</span>
                    <span class="stat-value" id="balance">0.00000</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Current Difficulty</span>
                    <span class="stat-value" id="difficulty">3</span>
                </div>
            </div>
            
            <div class="control-box">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="wallet" 
                        placeholder="Enter your Solana wallet address"
                    >
                    <button id="miningBtn" onclick="toggleMining()">Start Mining</button>
                </div>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="right-panel">
            <h2>Blockchain Visualization</h2>
            <div class="mempool-grid" id="mempoolGrid">
                <!-- Grid cells will be generated by JS -->
            </div>
            <div class="mining-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Mining Idle</span>
            </div>
        </div>
    </div>
    
    <script>
        // Background Animation
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const particleCount = 100;
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            
            draw() {
                ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 136, ${0.2 * (1 - distance / 150)})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        initParticles();
        animateParticles();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Mining Logic
        let walletAddress = '';
        let isMining = false;
        let totalHashes = 0;
        let validHashes = 0;
        let balance = 0;
        
        // Create Mempool Grid
        const grid = document.getElementById('mempoolGrid');
        const cells = [];
        
        for (let i = 0; i < 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            grid.appendChild(cell);
            cells.push(cell);
        }
        
        function activateRandomCells() {
            const numCells = Math.floor(Math.random() * 5) + 3;
            
            for (let i = 0; i < numCells; i++) {
                const randomIndex = Math.floor(Math.random() * cells.length);
                const cell = cells[randomIndex];
                
                // Random size
                const rand = Math.random();
                if (rand > 0.9) {
                    cell.className = 'grid-cell active xlarge';
                } else if (rand > 0.7) {
                    cell.className = 'grid-cell active large';
                } else {
                    cell.className = 'grid-cell active';
                }
                
                // Reset after animation
                setTimeout(() => {
                    cell.className = 'grid-cell';
                }, 2000);
            }
        }
        
        async function toggleMining() {
            const wallet = document.getElementById('wallet').value.trim();
            const btn = document.getElementById('miningBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (!isMining) {
                if (!wallet) {
                    alert('Please enter your Solana wallet address');
                    return;
                }
                
                walletAddress = wallet;
                
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ wallet_address: wallet })
                    });
                    
                    if (response.ok) {
                        isMining = true;
                        btn.textContent = 'Stop Mining';
                        btn.classList.add('stop');
                        statusDot.classList.add('active');
                        statusText.textContent = 'Mining Active';
                        statusText.classList.add('active');
                        startMining();
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    alert('Failed to register wallet');
                }
            } else {
                isMining = false;
                btn.textContent = 'Start Mining';
                btn.classList.remove('stop');
                statusDot.classList.remove('active');
                statusText.textContent = 'Mining Idle';
                statusText.classList.remove('active');
            }
        }
        
        async function startMining() {
            while (isMining) {
                try {
                    const taskResponse = await fetch('/api/mining');
                    const task = await taskResponse.json();
                    
                    document.getElementById('difficulty').textContent = task.difficulty;
                    
                    const solution = await solveChallenge(task.challenge, task.difficulty);
                    
                    if (!isMining) break;
                    
                    const solutionResponse = await fetch('/api/solution', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            wallet_address: walletAddress,
                            nonce: solution.nonce,
                            hash: solution.hash
                        })
                    });
                    
                    const result = await solutionResponse.json();
                    
                    if (result.success) {
                        validHashes++;
                        balance += result.tokens_earned;
                        activateRandomCells();
                        updateStats();
                    }
                    
                    totalHashes++;
                    document.getElementById('totalHashes').textContent = totalHashes;
                    
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                } catch (error) {
                    console.error('Mining error:', error);
                    await new Promise(resolve => setTimeout(resolve, 5000));
                }
            }
        }
        
        async function solveChallenge(challenge, difficulty) {
            const requiredPrefix = '0'.repeat(difficulty);
            let nonce = 0;
            
            while (true) {
                if (!isMining) return null;
                
                const data = challenge + nonce;
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                
                if (hashHex.startsWith(requiredPrefix)) {
                    return { nonce, hash: hashHex };
                }
                
                nonce++;
                
                if (nonce % 1000 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
        }
        
        function updateStats() {
            document.getElementById('validHashes').textContent = validHashes;
            document.getElementById('balance').textContent = balance.toFixed(5);
        }
    </script>
</body>
</html>
